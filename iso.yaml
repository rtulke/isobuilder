# iso.yaml — ISO-Quellen-Datenbank
#
# Felder:
#   id   — eindeutige Zahl
#   name — Anzeigename
#   url  — Quelle: http://, https://, ftp://, path://, file://
#            path://pfad/zu/datei.iso  →  lokale Datei (relativ zum Projektroot)
#   arch — amd64 | arm64 | armhf | i386 | ppc64el | riscv64 | s390x | mips64el | hurd-i386
#
# Hinweis: URLs können sich mit neuen Releases ändern — bitte vor dem Download prüfen.

