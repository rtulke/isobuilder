# templates/debian_netinstall_preseed.cfg
# Generic Debian NetInstall preseed — amd64, en_US, minimal
# Customize before use: hostname, timezone, keyboard, user credentials

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string local

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

### Partitioning (auto LVM, wipes /dev/sda)
d-i partman-auto/method string lvm
d-i partman-auto/disk string /dev/sda
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto-lvm/guided_size string max
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Root account (disabled, sudo-only)
d-i passwd/root-login boolean false

### User
# WARNING: change password before production use
d-i passwd/user-fullname string Admin
d-i passwd/username string admin
d-i passwd/user-password password changeme
d-i passwd/user-password-again password changeme
d-i user-setup/allow-password-weak boolean true

### Packages
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server sudo vim curl
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Late command (optional — runs postinstall.sh on first boot if present)
d-i preseed/late_command string \
    if [ -f /postinstall.sh ]; then \
      cp /postinstall.sh /target/root/postinstall.sh; \
      chmod +x /target/root/postinstall.sh; \
      echo '[Unit]' > /target/etc/systemd/system/postinstall.service; \
      echo 'Description=First Boot Post-Install' >> /target/etc/systemd/system/postinstall.service; \
      echo 'After=network.target' >> /target/etc/systemd/system/postinstall.service; \
      echo '[Service]' >> /target/etc/systemd/system/postinstall.service; \
      echo 'Type=oneshot' >> /target/etc/systemd/system/postinstall.service; \
      echo 'ExecStart=/root/postinstall.sh' >> /target/etc/systemd/system/postinstall.service; \
      echo 'RemainAfterExit=yes' >> /target/etc/systemd/system/postinstall.service; \
      echo '[Install]' >> /target/etc/systemd/system/postinstall.service; \
      echo 'WantedBy=multi-user.target' >> /target/etc/systemd/system/postinstall.service; \
      in-target systemctl enable postinstall.service; \
    fi

### Finish
d-i finish-install/reboot_in_progress note
