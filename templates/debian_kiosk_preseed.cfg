# templates/debian_kiosk_preseed.cfg
# Chromium/Zabbix kiosk — Swiss German, arm64, LVM, LXDE
# Target: ge999.naz.ch

### Localization
# Installer language: English (avoids German error messages in logs)
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string CH
# System locale: German/Switzerland
d-i localechooser/supported-locales multiselect de_CH.UTF-8
# Swiss German keyboard
d-i keyboard-configuration/xkb-keymap select ch
d-i keyboard-configuration/layout select ch
d-i keyboard-configuration/variant select de_nodeadkeys

### Network
# auto = picks first interface with link; WiFi disabled via late_command
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string ge999
d-i netcfg/get_domain string naz.ch
d-i netcfg/hostname string ge999.naz.ch

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Zurich
d-i clock-setup/ntp boolean true

### Partitioning (auto LVM, wipes disk)
d-i partman-auto/method string lvm
d-i partman-auto/disk string /dev/sda
d-i partman-lvm/device_change_failed boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto-lvm/guided_size string max
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Root account (disabled, sudo-only)
d-i passwd/root-login boolean false

### User
d-i passwd/user-fullname string system
d-i passwd/username string system
# Generate hash: echo "system" | mkpasswd -s -m sha-512
d-i passwd/user-password password system
d-i passwd/user-password-again password system
d-i user-setup/allow-password-weak boolean true

### Packages
tasksel tasksel/first multiselect standard
d-i pkgsel/include string \
    openssh-server \
    sudo \
    vim \
    ansible \
    git \
    lightdm \
    curl \
    chromium \
    lxde-core \
    xinit \
    x11-xserver-utils \
    unclutter \
    xinput \
    xserver-xorg \
    xscreensaver
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Late command: copy postinstall.sh + first-boot service + disable WiFi
d-i preseed/late_command string \
    cp /postinstall.sh /target/root/postinstall.sh; \
    chmod +x /target/root/postinstall.sh; \
    mkdir -p /target/etc/NetworkManager/conf.d; \
    printf '[keyfile]\nunmanaged-devices=type:wifi\n' \
      > /target/etc/NetworkManager/conf.d/99-disable-wifi.conf; \
    echo '[Unit]' > /target/etc/systemd/system/postinstall.service; \
    echo 'Description=First Boot Post-Install' >> /target/etc/systemd/system/postinstall.service; \
    echo 'After=network.target' >> /target/etc/systemd/system/postinstall.service; \
    echo '[Service]' >> /target/etc/systemd/system/postinstall.service; \
    echo 'Type=oneshot' >> /target/etc/systemd/system/postinstall.service; \
    echo 'ExecStart=/root/postinstall.sh' >> /target/etc/systemd/system/postinstall.service; \
    echo 'RemainAfterExit=yes' >> /target/etc/systemd/system/postinstall.service; \
    echo '[Install]' >> /target/etc/systemd/system/postinstall.service; \
    echo 'WantedBy=multi-user.target' >> /target/etc/systemd/system/postinstall.service; \
    in-target systemctl enable postinstall.service

### Finish
d-i finish-install/reboot_in_progress note
